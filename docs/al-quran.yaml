          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: OK
                  data:
                    $ref: "#/components/schemas/200SearchSahihResponse"
                type: object
        "404":
          $ref: "#/components/responses/404SearchResponse"
