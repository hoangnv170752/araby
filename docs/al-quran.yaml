          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 404
                  status:
                    type: string
                    example: NOT FOUND
                  data:
                    type: string
                    example: Invalid language.
                type: object
  /hizbQuarter/{number}:
    get:
      tags:
        - HizbQuarter
      summary: Hizb Quarter for the requested number
      description: Returns the Hizb Quarter for the requested number
      operationId: 155e56b81f25ed3071a1ef34593ffa8c
      parameters:
        - $ref: "#/components/parameters/HizbQuarterNumberParameter"
        - $ref: "#/components/parameters/HizbQuarterOffsetQueryParameter"
        - $ref: "#/components/parameters/LimitQueryParameter"
        - $ref: "#/components/parameters/Accept-Encoding"
      responses:
        "200":
