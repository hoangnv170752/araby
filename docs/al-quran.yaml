                      - ar
                      - am
                      - az
                      - ber
                      - bn
                      - cs
                      - ce
                      - de
                      - dv
                      - en
                      - es
                      - fa
                      - fr
                      - ha
                      - hi
                      - id
                      - it
                      - ja
                      - ko
                      - ku
                      - kk
                      - ml
                      - nl
                      - no
                      - pl
                      - ps
                      - pt
                      - ro
                      - ru
                      - sd
                      - so
                      - sq
                      - sv
                      - sw
                      - ta
                      - tg
                      - th
                      - tr
                      - tt
                      - ug
                      - ur
                      - uz
                type: object
        "404":
          $ref: "#/components/responses/404NotFoundResourceResponse"
  /edition/language/{lang}:
    get:
      tags:
        - Edition
      summary: List of all editions for the requested language
      description: Returns a list of all editions that belong to the requested language
      operationId: d11d091527816a6e91dc810774200619
