  /meta:
    get:
      tags:
        - Meta
      summary: Get metadata
      description: Returns all the available meta data about Surahs, Pages, Hizbs and Juzs.
      operationId: d507a008e8d45c60b0e3dbb36d120e83
      parameters:
        - $ref: "#/components/parameters/Accept-Encoding"
      responses:
        "200":
          description: Returns all the available meta data about Surahs, Pages, Hizbs and
            Juzs.
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: OK
                  data:
                    properties:
                      ayahs:
                        properties:
                          count:
                            type: integer
                            example: 6236
                        type: object
                      surahs:
                        properties:
                          count:
                            type: integer
                            example: 114
                          references:
                            type: array
                            items:
                              properties:
                                number:
                                  type: integer
                                  example: 1
                                name:
                                  type: string
                                  example: سُورَةُ ٱلْفَاتِحَةِ
                                englishName:
                                  type: string
                                  example: Al-Faatiha
                                englishNameTranslation:
                                  type: string
                                  example: The Opening
                                numberOfAyahs:
                                  type: integer
                                  example: 7
                                revelationType:
                                  type: string
                                  example: Meccan
                              type: object
                        type: object
                      sajdas:
                        properties:
                          count:
                            type: integer
                            example: 15
                          references:
                            type: array
                            items:
                              properties:
                                surah:
                                  type: integer
                                  example: 7
                                ayah:
                                  type: integer
                                  example: 206
                                recommended:
                                  type: boolean
                                  example: true
                                obligatory:
                                  type: boolean
                                  example: false
                              type: object
                        type: object
                      rukus:
                        properties:
                          count:
                            type: integer
                            example: 556
                          references:
                            type: array
                            items:
                              $ref: "#/components/schemas/200MetaReferenceResponse"
                        type: object
                      pages:
                        properties:
                          count:
                            type: integer
                            example: 604
                          references:
                            type: array
                            items:
                              $ref: "#/components/schemas/200MetaReferenceResponse"
                        type: object
                      manzils:
                        properties:
                          count:
                            type: integer
                            example: 7
                          references:
                            type: array
                            items:
                              $ref: "#/components/schemas/200MetaReferenceResponse"
                        type: object
                      hizbQuarters:
                        properties:
                          count:
                            type: integer
                            example: 240
                          references:
                            type: array
                            items:
                              $ref: "#/components/schemas/200MetaReferenceResponse"
                        type: object
                      juzs:
                        properties:
                          count:
                            type: integer
                            example: 30
                          references:
                            type: array
                            items:
                              $ref: "#/components/schemas/200MetaReferenceResponse"
                        type: object
                    type: object
                type: object
        "404":
          $ref: "#/components/responses/404NotFoundResourceResponse"
  /page/{number}:
