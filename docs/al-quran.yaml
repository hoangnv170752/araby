              - bn
              - cs
              - de
              - dv
              - en
              - es
              - fa
              - fr
              - ha
              - hi
              - id
              - it
              - ja
              - ko
              - ku
              - ml
              - nl
              - no
              - pl
              - ps
              - pt
              - ro
              - ru
              - sd
              - so
              - sq
