openapi: 3.1.0
info:
  title: بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ
  description: "<p><b />AlQuran API\r

    \        <br />The Holy Quran is a divine book from Allah SWT.</p>\r

    \        You can get the text for complete edition, search words in text
    using the endpoints below."
  version: v1
servers:
  - url: https://api.alquran.cloud/v1
  - url: http://api.alquran.cloud/v1
paths:
  /ayah/random:
    get:
      tags:
        - Ayah
      summary: Single Ayah randomly
      description: Returns a single Ayah and its details randomly
      operationId: 917e5b1f05e0bb5c059ba27aac03ab87
      parameters:
        - $ref: "#/components/parameters/Accept-Encoding"
      responses:
        "200":
          description: Returns a single Ayah and its details randomly
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: OK
                  data:
                    $ref: "#/components/schemas/200AyahQuranUthmaniResponse"
                type: object
        "404":
          $ref: "#/components/responses/404NotFoundResourceResponse"
  /ayah/random/{edition}:
    get:
      tags:
        - Ayah
      summary: Single Ayah randomly based on edition
      description: Returns a single Ayah and its details randomly based on the edition
      operationId: 4f7e69a1183be88b15e6d8f087e35ded
      parameters:
        - $ref: "#/components/parameters/AyahEditionNameParameter"
        - $ref: "#/components/parameters/Accept-Encoding"
      responses:
        "200":
          description: Returns a single Ayah and its details randomly based on the edition
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: OK
                  data:
                    $ref: "#/components/schemas/200AyahQuranUthmaniResponse"
                type: object
        "404":
          $ref: "#/components/responses/404NotFoundResourceResponse"
  /ayah/random/editions/{editions}:
    get:
      tags:
        - Ayah
      summary: Single Ayah randomly based on list of editions
      description: Returns a single Ayah and its details randomly based on the given
        list of editions
      operationId: a82b32f2354214385885629da5a7ea9e
      parameters:
        - $ref: "#/components/parameters/AyahEditionsListParameter"
        - $ref: "#/components/parameters/Accept-Encoding"
      responses:
        "200":
          description: Returns a single Ayah and its details randomly based on the given
            list of editions
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: OK
                  data:
                    type: array
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/200AyahQuranUthmaniResponse"
                        - $ref: "#/components/schemas/200AyahQuranSimpleResponse"
                type: object
        "404":
          $ref: "#/components/responses/404NotFoundResourceResponse"
  /ayah/{number}:
    get:
      tags:
        - Ayah
      summary: Single Ayah
      description: Returns a single Ayah and its details based on the given number
      operationId: 48e419106a7a8de41384cf0e0798a88f
      parameters:
        - $ref: "#/components/parameters/AyahNumberParameter"
        - $ref: "#/components/parameters/Accept-Encoding"
      responses:
        "200":
          description: Returns a single Ayah and its details based on the given number
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: OK
                  data:
                    $ref: "#/components/schemas/200AyahQuranUthmaniResponse"
                type: object
        "404":
          $ref: "#/components/responses/404AyahResponse"
  /ayah/{number}/{edition}:
    get:
      tags:
        - Ayah
      summary: Single Ayah based on number and edition
      description: Returns a single Ayah and its details based on the given number and
        edition
      operationId: 8eac3435f60394d7a8a188668a0d98b5
      parameters:
        - $ref: "#/components/parameters/AyahNumberParameter"
        - $ref: "#/components/parameters/AyahEditionNameParameter"
        - $ref: "#/components/parameters/Accept-Encoding"
      responses:
        "200":
          description: Returns a single Ayah and its details based on the given number and
            edition
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: OK
                  data:
                    $ref: "#/components/schemas/200AyahQuranUthmaniResponse"
                type: object
        "404":
          $ref: "#/components/responses/404AyahResponse"
  /ayah/{number}/editions/{editions}:
    get:
      tags:
        - Ayah
      summary: Single Ayah based on the number and list of editions
      description: Returns a single Ayah and its details based on the given number and
        based on the given list of editions
      operationId: ed4317310780640d8f8527971ce99ca5
      parameters:
        - $ref: "#/components/parameters/AyahNumberParameter"
        - $ref: "#/components/parameters/AyahEditionsListParameter"
        - $ref: "#/components/parameters/Accept-Encoding"
      responses:
        "200":
          description: Returns a single Ayah and its details based on the given number and
            based on the given list of editions
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: OK
                  data:
                    type: array
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/200AyahQuranUthmaniResponse"
                        - $ref: "#/components/schemas/200AyahQuranSimpleResponse"
                type: object
        "404":
          description: Ayah - Not Found
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 404
                  status:
                    type: string
                    example: NOT FOUND
                  data:
                    type: array
                    items:
                      type: string
                    example:
                      - Please specify an Ayah number (1 to 6236).
                      - Please specify an Ayah number (1 to 6236).
                type: object
  /edition:
    get:
      tags:
        - Edition
      summary: List of all editions
      description: Returns a list of all editions
      operationId: 105038bd4ee8ee8cc993ef7f9ec45904
      parameters:
        - name: type
          in: query
          description: Type of the editions
          required: false
          schema:
            type: string
          example: quran
        - name: format
          in: query
          description: Format of the editions
          required: false
          schema:
            type: string
          example: text
        - name: language
          in: query
          description: Language of the editions
          required: false
          schema:
            type: string
          example: ar
        - $ref: "#/components/parameters/Accept-Encoding"
      responses:
        "200":
          description: Returns a list of all editions
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: OK
                  data:
                    type: array
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/200EditionQuranUthmaniResponse"
                        - $ref: "#/components/schemas/200EditionQuranSimpleResponse"
                type: object
        "404":
          $ref: "#/components/responses/404NotFoundResourceResponse"
  /edition/type:
    get:
      tags:
        - Edition
      summary: List of edition types
      description: Returns a list of all edition types
      operationId: 6a0be41754109518226052ce394a4a65
      responses:
        "200":
          description: Returns a list of all edition types
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: OK
                  data:
                    type: array
                    items:
                      type: string
                    example:
                      - quran
                      - versebyverse
                      - transliteration
                      - translation
                      - tafsir
                type: object
        "404":
          $ref: "#/components/responses/404NotFoundResourceResponse"
  /edition/type/{type}:
    get:
      tags:
        - Edition
      summary: List of all editions for the requested type
      description: Returns a list of all editions that belong to the requested type
      operationId: d0e01a92f84071e7814086f4a26ac9ed
      parameters:
        - name: type
          in: path
          description: Type of the editions
          required: true
          schema:
            type: string
            enum:
              - quran
              - versebyverse
              - transliteration
              - translation
              - tafsir
          example: quran
      responses:
        "200":
          description: Returns a list of all editions that belong to the requested type
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: OK
                  data:
                    type: array
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/200EditionQuranUthmaniResponse"
                        - $ref: "#/components/schemas/200EditionQuranSimpleResponse"
                type: object
        "404":
          description: Edition Type - Not Found
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 404
                  status:
                    type: string
                    example: NOT FOUND
                  data:
                    type: string
                    example: Invalid type.
                type: object
  /edition/format:
    get:
      tags:
        - Edition
      summary: List of edition formats
      description: Returns a list of all edition formats
      operationId: f0482501d21f6fd72c272d82354195ba
      parameters:
        - $ref: "#/components/parameters/Accept-Encoding"
      responses:
        "200":
          description: Returns a list of all edition formats
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: OK
                  data:
                    type: array
                    items:
                      type: string
                    example:
                      - text
                      - audio
                type: object
        "404":
          $ref: "#/components/responses/404NotFoundResourceResponse"
  /edition/format/{format}:
    get:
      tags:
        - Edition
      summary: List of all editions for the requested format
      description: Returns a list of all editions that belong to the requested format
      operationId: 1a1f59dcbcbf11c6e44cd41d3e9915b1
