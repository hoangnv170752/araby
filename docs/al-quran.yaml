        the english editions
      description: "Returns ayahs that match the specified 'word' parameter in a given
        edition or language. \r

        \        <br />If you do not specify an edition or language, all english
        language texts are searched.\r

        \        <br />(Text) In this example all ayahs that contain the word
        'Path' are returned in all the english editions from all Surahs /
        Chapters."
      operationId: b33750a1048644a0eceec01ac2fb77d2
      parameters:
        - $ref: "#/components/parameters/SearchWordParameter"
        - $ref: "#/components/parameters/Accept-Encoding"
      responses:
        "200":
          description: Returns all ayahs that contain the word 'Path' in all the english
            editions from all Surahs / Chapters.
          content:
            application/json:
              schema:
                properties:
                  code:
                    type: integer
                    example: 200
                  status:
                    type: string
                    example: OK
                  data:
                    $ref: "#/components/schemas/200SearchSahihResponse"
                type: object
        "404":
          $ref: "#/components/responses/404SearchResponse"
